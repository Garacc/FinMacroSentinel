# FinMacroSentinel - Docker Compose
# Automated financial news analysis and investment decision support system

services:
  # 后端服务：定时生成简报
  finmacro-sentinel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finmacro-sentinel
    restart: unless-stopped
    environment:
      # Anthropic Claude API
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-5-sonnet-20241022}
      - ANTHROPIC_API_ENDPOINT=${ANTHROPIC_API_ENDPOINT:-}

      # Feishu Configuration (Webhook 方式)
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL}
      - FEISHU_WEBHOOK_SECRET=${FEISHU_WEBHOOK_SECRET:-}
      # Feishu Configuration (API 方式)
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - FEISHU_CHAT_ID=${FEISHU_CHAT_ID:-}

      # Storage
      - OUTPUT_DIR=/app/output

      # Scheduler (default: weekdays 09:00, 12:30, 21:00 Beijing)
      - SCHEDULE_CRON=${SCHEDULE_CRON:-0 9,12,21 * * *}

      # API Data Sources
      - FRED_API_KEY=${FRED_API_KEY:-}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}

      # Timezone
      - TZ=Asia/Shanghai
    volumes:
      # Persist output reports
      - ./output:/app/output
      # Optional: persist data directory
      - ./data:/app/data

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Network (for API calls)
    networks:
      - finmacro-network

  # Web 前端服务
  finmacro-web:
    build:
      context: ./web
      dockerfile: ../Dockerfile.web
    container_name: finmacro-web
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      # 挂载 output 目录以读取报告
      - ./output:/app/output
    environment:
      - NODE_ENV=production
      - PORT=3001
      - REPORTS_DIR=/app/output
    # Web 前端不需要特殊命令，使用默认的 next start
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - finmacro-network
    depends_on:
      - finmacro-sentinel

networks:
  finmacro-network:
    driver: bridge
